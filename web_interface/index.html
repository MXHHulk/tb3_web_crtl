<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurtleBot3 CCPP Monitor</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/libs/eventemitter2.min.js"></script>
    <script src="js/libs/roslib.min.js"></script>
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-dark bg-primary">
        <span class="navbar-brand mb-0 h1">TurtleBot3 CCPP 實體監控系統</span>
        <div id="status" class="badge badge-danger">未連線</div>
    </nav>

    <div class="container-fluid mt-3">
        <div class="row">
            <div class="col-md-8">
                <!-- 進度條 -->
                <div class="progress mb-2" style="height: 25px;">
                    <div id="overall-progress" class="progress-bar progress-bar-striped progress-bar-animated" role="progressbar" style="width: 0%;">0%</div>
                </div>
                
                <div class="card bg-secondary">
                    <div class="card-header d-flex justify-content-between">
                        <span>視覺化地圖 (疊層模式)</span>
                        <small id="map-info">等待地圖數據...</small>
                    </div>
                    <div class="card-body p-0 position-relative" style="overflow: auto; max-height: 75vh; background: #333;">
                        <canvas id="canvas-map"></canvas>
                        <canvas id="canvas-coverage" class="position-absolute" style="top: 0; left: 0; pointer-events: none; opacity: 0.5;"></canvas>
                        <canvas id="canvas-overlay" class="position-absolute" style="top: 0; left: 0; pointer-events: none;"></canvas>
                    </div>
                </div>
            </div>
            
            <div class="col-md-4">
                <div class="card bg-secondary mb-3">
                    <div class="card-header">任務控制</div>
                    <div class="card-body">
                        <button id="btn-start" class="btn btn-success btn-block mb-2">啟動 CCPP 任務</button>
                        <button id="btn-stop" class="btn btn-danger btn-block mb-3">緊急停止</button>
                        
                        <h6>系統圖例</h6>
                        <ul class="list-group list-group-flush bg-dark text-light small">
                            <li class="list-group-item bg-dark border-secondary"><span style="color:white">■</span> 原始地圖</li>
                            <li class="list-group-item bg-dark border-secondary"><span style="color:rgba(0,255,0,0.5)">■</span> 當前目標區域</li>
                            <li class="list-group-item bg-dark border-secondary"><span style="color:rgba(0,0,255,0.5)">■</span> 已覆蓋區域</li>
                            <li class="list-group-item bg-dark border-secondary"><span style="color:yellow">●</span> 機器人位置</li>
                        </ul>
                    </div>
                </div>
                
                <div class="card bg-secondary">
                    <div class="card-header">機器人狀態</div>
                    <div class="card-body">
                        <p>任務狀態: <span id="task-state" class="text-warning">IDLE</span></p>
                        <p>當前位置: <span id="robot-pos">--</span></p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/map_visualizer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
