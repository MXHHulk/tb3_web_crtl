<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TurtleBot3 CCPP Monitor Pro</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css">
    <link rel="stylesheet" href="css/style.css">
    <script src="js/libs/eventemitter2.min.js"></script>
    <script src="js/libs/roslib.min.js"></script>
</head>
<body class="bg-dark text-light">
    <nav class="navbar navbar-dark bg-primary shadow">
        <span class="navbar-brand mb-0 h1">TB3 CCPP 動態監控系統</span>
        <div>
            <span id="status" class="badge badge-danger">未連線</span>
            <span id="task-state" class="badge badge-warning ml-2">IDLE</span>
        </div>
    </nav>

    <!-- 地圖控制浮動面板 -->
    <div id="map-controls" class="btn-group-vertical shadow">
        <button id="btn-zoom-in" class="btn btn-light" title="放大">+</button>
        <button id="btn-zoom-out" class="btn btn-light" title="縮小">-</button>
        <button id="btn-rotate-l" class="btn btn-light" title="左旋">↺</button>
        <button id="btn-rotate-r" class="btn btn-light" title="右旋">↻</button>
        <button id="btn-reset" class="btn btn-light" title="重設">⌂</button>
    </div>

    <div class="container-fluid mt-3">
        <div class="row">
            <!-- 左側主地圖視窗 -->
            <div class="col-md-9">
                <div class="progress mb-2" style="height: 10px;">
                    <div id="overall-progress" class="progress-bar progress-bar-striped progress-bar-animated" style="width: 0%;"></div>
                </div>
                
                <div class="card bg-secondary border-0 shadow">
                    <div class="card-header py-1 d-flex justify-content-between align-items-center">
                        <small>即時地圖 (滾輪縮放 / 拖曳平移)</small>
                        <small id="map-info">等待資料...</small>
                    </div>
                    <div id="viewport" class="card-body p-0 position-relative overflow-hidden" style="height: 75vh; background: #222; cursor: crosshair;">
                        <canvas id="canvas-map" class="map-layer"></canvas>
                        <canvas id="canvas-processed" class="map-layer" style="opacity: 0.7;"></canvas>
                        <canvas id="canvas-coverage" class="map-layer" style="opacity: 0.5;"></canvas>
                        <canvas id="canvas-overlay" class="map-layer"></canvas>
                    </div>
                </div>
            </div>
            
            <!-- 右側資訊面板 -->
            <div class="col-md-3">
                <div class="card bg-dark border-secondary mb-3">
                    <div class="card-header border-secondary">任務控制</div>
                    <div class="card-body p-2">
                        <button id="btn-start" class="btn btn-success btn-block mb-1">啟動任務</button>
                        <button id="btn-stop" class="btn btn-danger btn-block mb-1">緊急停止</button>
                        <button id="btn-reset-coverage" class="btn btn-warning btn-block">重新見圖 (清除路徑)</button>
                    </div>
                </div>

                <div class="card bg-dark border-secondary mb-3">
                    <div class="card-header border-secondary">手動控制 (Teleop)</div>
                    <div class="card-body text-center p-2">
                        <div class="btn-group-vertical w-100">
                            <button id="btn-teleop-w" class="btn btn-secondary mb-1">前進 (W)</button>
                            <div class="d-flex justify-content-between mb-1">
                                <button id="btn-teleop-a" class="btn btn-secondary flex-fill mr-1">左轉 (A)</button>
                                <button id="btn-teleop-s" class="btn btn-danger flex-fill mx-1">停止 (S)</button>
                                <button id="btn-teleop-d" class="btn btn-secondary flex-fill ml-1">右轉 (D)</button>
                            </div>
                            <button id="btn-teleop-x" class="btn btn-secondary">後退 (X)</button>
                        </div>
                    </div>
                </div>
                
                <div class="card bg-dark border-secondary">
                    <div class="card-header border-secondary">機器人狀態</div>
                    <div class="card-body p-2">
                        <ul class="list-unstyled small">
                            <li>位置: <b id="robot-pos" class="text-info">--</b></li>
                            <li>進度: <b id="progress-text" class="text-success">0%</b></li>
                        </ul>
                        <hr class="bg-secondary">
                        <h6>視覺化分層</h6>
                        <div class="custom-control custom-checkbox small">
                            <input type="checkbox" class="custom-control-input" id="layer-map" checked>
                            <label class="custom-control-label" for="layer-map">原始地圖 (White)</label>
                        </div>
                        <div class="custom-control custom-checkbox small">
                            <input type="checkbox" class="custom-control-input" id="layer-processed">
                            <label class="custom-control-label" for="layer-processed">去毛邊地圖 (Algorithm View)</label>
                        </div>
                        <div class="custom-control custom-checkbox small">
                            <input type="checkbox" class="custom-control-input" id="layer-coverage" checked>
                            <label class="custom-control-label" for="layer-coverage">已覆蓋區 (Blue)</label>
                        </div>
                        <div class="custom-control custom-checkbox small">
                            <input type="checkbox" class="custom-control-input" id="layer-target" checked>
                            <label class="custom-control-label" for="layer-target">當前目標 (Green)</label>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="js/map_visualizer.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
